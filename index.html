<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    background: black;
}

video {
    width: 100%;
    height: auto;
    display: block;
}
</style>
</head>
<body>

<select id="quality">
    <option value="1080">1080p</option>
    <option value="720">720p</option>
</select>

<video id="player" controls autoplay playsinline>
</video>

<script>
const player = document.getElementById("player");

const videos = {
    1080: "https://af1.downet.net/download/1780433124/6a1def64a8d5a/The.Peanut.Butter.Falcon.2019.1080p.BluRay.aflaam.com.mp4",
    720:  "https://af1.downet.net/download/1780433125/6a1def6539f5b/The.Peanut.Butter.Falcon.2019.720p.BluRay.aflaam.com.mp4",
};

function setQuality(q) {
    const t = player.currentTime;
    const paused = player.paused;

    player.src = videos[q];

    player.onloadedmetadata = () => {
        player.currentTime = t;
        if (!paused) player.play();
    };
}

document.getElementById("quality").onchange = e => {
    setQuality(e.target.value);
};

setQuality("1080");
</script>

</body>
</html>
