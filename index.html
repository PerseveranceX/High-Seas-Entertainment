<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">

<style>
html, body {
    margin: 0;
    overflow: hidden;
}

#player {
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>

<video id="player" controls playsinline>
</video>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
const sources = {
    1080: "https://af1.downet.net/download/1780433124/6a1def64a8d5a/The.Peanut.Butter.Falcon.2019.1080p.BluRay.aflaam.com.mp4",
    720:  "https://af1.downet.net/download/1780433125/6a1def6539f5b/The.Peanut.Butter.Falcon.2019.720p.BluRay.aflaam.com.mp4",
};

const video = document.getElementById('player');

video.src = sources[1080];

const player = new Plyr(video, {
    settings: ['quality', 'speed'],
    quality: {
        default: 1080,
        options: [1080, 720],
        forced: true,
        onChange: q => {
            const t = video.currentTime;
            const paused = video.paused;

            video.src = sources[q];

            video.onloadedmetadata = () => {
                video.currentTime = t;
                if (!paused) video.play();
            };
        }
    }
});
</script>

</body>
</html>
